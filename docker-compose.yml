services:
  postgres:
    image: ghcr.io/pgmq/pg18-pgmq:v1.11.0
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pgmq
      POSTGRES_PASSWORD: pgmq
      POSTGRES_DB: pgmq
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgmq"]
      interval: 2s
      timeout: 5s
      retries: 5
